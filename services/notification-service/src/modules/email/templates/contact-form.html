<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Novo contato recebido</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f1f5f9;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background-color:#ffffff;border-radius:12px;box-shadow:0 4px 12px rgba(15,23,42,0.06);overflow:hidden;">
            <tr>
              <td style="background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);padding:28px 40px;">
                <div style="color:#ffffff;font-size:22px;font-weight:700;">DevTechs</div>
                <div style="color:#94a3b8;font-size:13px;margin-top:4px;">Formulário de contato</div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 40px;">
                <div style="display:inline-block;background-color:#ecfdf5;color:#047857;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:0.02em;text-transform:uppercase;">
                  {{assunto}}
                </div>
                <h1 style="margin:12px 0 24px 0;font-size:20px;line-height:1.3;color:#0f172a;font-weight:700;">Novo contato recebido</h1>

                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:separate;border-spacing:0 8px;">
                  <tr>
                    <td width="110" style="font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Nome</td>
                    <td style="font-size:14px;color:#0f172a;">{{nome}}</td>
                  </tr>
                  <tr>
                    <td style="font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Email</td>
                    <td style="font-size:14px;"><a href="mailto:{{email}}" style="color:#2563eb;text-decoration:none;">{{email}}</a></td>
                  </tr>
                  <tr>
                    <td style="font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Telefone</td>
                    <td style="font-size:14px;color:#0f172a;">{{telefone}}</td>
                  </tr>
                  <tr>
                    <td style="font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">IP</td>
                    <td style="font-size:13px;color:#475569;font-family:'SFMono-Regular',Consolas,monospace;">{{ipAddress}}</td>
                  </tr>
                  <tr>
                    <td style="font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Recebido</td>
                    <td style="font-size:13px;color:#475569;">{{submittedAt}}</td>
                  </tr>
                </table>

                <div style="margin-top:28px;padding:20px;background-color:#f8fafc;border-left:4px solid #0f172a;border-radius:6px;">
                  <div style="font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Mensagem</div>
                  <div style="font-size:14px;line-height:1.6;color:#0f172a;white-space:pre-wrap;">{{mensagem}}</div>
                </div>

                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:28px 0 4px 0;">
                  <tr>
                    <td align="center" bgcolor="#0f172a" style="border-radius:8px;">
                      <a href="mailto:{{email}}" target="_blank" style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:8px;">
                        Responder por email
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="background-color:#f8fafc;padding:20px 40px;text-align:center;border-top:1px solid #e2e8f0;">
                <p style="margin:0;font-size:12px;color:#94a3b8;">
                  DevTechs &middot; Mensagem recebida via formulário público
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
