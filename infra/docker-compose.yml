  suporte:
    restart: unless-stopped
    container_name: devtechs-suporte
    build:
      context: ..
      dockerfile: apps/suporte/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 4005
    expose:
      - "4005"
    networks:
      - devtechs

  store:
    restart: unless-stopped
    container_name: devtechs-store
    build:
      context: ..
      dockerfile: apps/store/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 4006
