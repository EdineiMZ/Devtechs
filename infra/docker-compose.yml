version: "3.9"

# -----------------------------------------------------------------------------
# SZDevs - docker-compose base
#
# Profiles
# --------
#   (none)        postgres + redis + (optional) dev tooling. This is the
#                 stack you want when developing â€” the apps and services
#                 themselves run natively on the host with `pnpm dev`,
#                 talking to containerized infra on localhost ports.
#   prod          The full production topology: nginx + every service +
#                 every Next.js app, all containerized, no host ports for
#                 the services (only nginx is exposed to the host).
#   dev-tools     Optional extras (adminer, mailhog, prisma studio).
#                 Add and gate behind this profile when you need them.
#
# Usage:
#   docker compose up -d                     # infra only (dev workflow)
#   docker compose --profile prod up -d      # full prod-shaped stack
#   docker compose --profile dev-tools up -d # tooling only
#
# All services share the `SZDevs` network and read secrets from the
# root `.env` file (copy `.env.example` to `.env` and fill in real
# values).
# -----------------------------------------------------------------------------

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - ../.env
  networks:
    - SZDevs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  profiles:
    - prod

services:
  # ---------------------------------------------------------------------------
  # Infra
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: SZDevs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-SZDevs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SZDevs}
      POSTGRES_DB: ${POSTGRES_DB:-SZDevs}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - SZDevs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-SZDevs} -d ${POSTGRES_DB:-SZDevs}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: SZDevs-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--bind", "0.0.0.0"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - SZDevs
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: SZDevs-nginx
    restart: unless-stopped
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      # Static API docs (Redoc page + unified OpenAPI spec). Generated
      # by `pnpm docs:generate` at the repo root before each prod
      # deploy. Read-only mount.
      - ../docs:/usr/share/nginx/html/docs:ro
    networks:
      - SZDevs
    depends_on:
      - auth-service
      - rh-service
      - finance-service
      - projects-service
      - devops-service
      - support-service
      - payments-service
      - notification-service
      - license-service
      - developer-service
      - web
      - store
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # NestJS microservices
  # ---------------------------------------------------------------------------
  auth-service:
    <<: *service-defaults
    container_name: SZDevs-auth-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/auth-service"
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_2FA_TEMP_SECRET: ${JWT_2FA_TEMP_SECRET:-}
      AUTH_INTERNAL_SECRET: ${AUTH_INTERNAL_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://szdevs.com,http://localhost:4000}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  rh-service:
    <<: *service-defaults
    container_name: SZDevs-rh-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/rh-service"
    environment:
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  finance-service:
    <<: *service-defaults
    container_name: SZDevs-finance-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/finance-service"
    environment:
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  projects-service:
    <<: *service-defaults
    container_name: SZDevs-projects-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/projects-service"
    environment:
      PORT: 3004
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    expose:
      - "3004"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  devops-service:
    <<: *service-defaults
    container_name: SZDevs-devops-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/devops-service"
    environment:
      PORT: 3005
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    expose:
      - "3005"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  support-service:
    <<: *service-defaults
    container_name: SZDevs-support-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/support-service"
    environment:
      PORT: 3006
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    expose:
      - "3006"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  payments-service:
    <<: *service-defaults
    container_name: SZDevs-payments-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/payments-service"
    environment:
      PORT: 3007
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    expose:
      - "3007"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  notification-service:
    <<: *service-defaults
    container_name: SZDevs-notification-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/notification-service"
    environment:
      PORT: 3008
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    expose:
      - "3008"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3008/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  license-service:
    <<: *service-defaults
    container_name: SZDevs-license-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/license-service"
    environment:
      PORT: 3009
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LICENSE_SIGNING_KEY: ${LICENSE_SIGNING_KEY}
    expose:
      - "3009"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3009/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  developer-service:
    <<: *service-defaults
    container_name: SZDevs-developer-service
    build:
      context: ..
      dockerfile: Dockerfile.service
      args:
        PACKAGE_NAME: "@szdevs/developer-service"
    environment:
      PORT: 3010
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AUTH_INTERNAL_SECRET: ${AUTH_INTERNAL_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      DOCKER_SOCKET_PATH: /var/run/docker.sock
    expose:
      - "3010"
    # Mount the host Docker socket so dockerode can manage sibling
    # containers (start/stop/restart/logs). The developer-service
    # process must run as a user inside the host's `docker` group
    # for this to work without root â€” see Dockerfile.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Next.js frontends
  # ---------------------------------------------------------------------------
  web:
    restart: unless-stopped
    container_name: SZDevs-web
    profiles:
      - prod
    build:
      context: ..
      dockerfile: Dockerfile.app
      args:
        PACKAGE_NAME: "@szdevs/web"
        APP_NAME: web
    env_file:
      - ../.env
    environment:
      PORT: 4000
      SZDEVS_API_URL: ${SZDEVS_API_URL:-http://172.16.1.1:5100}
    expose:
      - "4000"
    networks:
      - SZDevs
    depends_on:
      auth-service:
        condition: service_healthy

  # Module apps (rh / financeiro / projetos / devops / suporte / developer)
  # were retired and consolidated into `web` under /admin/* and /perfil/*.
  # Only `web` and the public planos/checkout SaaS `store` remain.
  store:
    restart: unless-stopped
    container_name: SZDevs-store
    profiles:
      - prod
    build:
      context: ..
      dockerfile: Dockerfile.app
      args:
        PACKAGE_NAME: "@szdevs/store"
        APP_NAME: store
    env_file:
      - ../.env
    environment:
      PORT: 4006
    expose:
      - "4006"
    networks:
      - SZDevs
    depends_on:
      payments-service:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # One-shot Prisma migration runner
  # Run with: docker compose --profile migrate run --rm migrate
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile.migrate
    container_name: SZDevs-migrate
    env_file:
      - ../.env
    networks:
      - SZDevs
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - migrate

networks:
  SZDevs:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
