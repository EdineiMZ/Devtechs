user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ---------- Core ----------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    client_max_body_size 25m;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---------- WebSocket upgrade map ----------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------
    # Upstreams - NestJS microservices (services/*)
    # -------------------------------------------------------------------
    upstream auth_service         { server auth-service:3001; }
    upstream rh_service           { server rh-service:3002; }
    upstream finance_service      { server finance-service:3003; }
    upstream projects_service     { server projects-service:3004; }
    upstream devops_service       { server devops-service:3005; }
    upstream support_service      { server support-service:3006; }
    upstream payments_service     { server payments-service:3007; }
    upstream notification_service { server notification-service:3008; }
    upstream license_service      { server license-service:3009; }
    upstream developer_service    { server developer-service:3010; }

    # -------------------------------------------------------------------
    # Upstreams - Next.js apps (apps/*)
    # -------------------------------------------------------------------
    upstream web_app         { server web:4000; }
    upstream rh_app          { server rh:4001; }
    upstream financeiro_app  { server financeiro:4002; }
    upstream projetos_app    { server projetos:4003; }
    upstream devops_app      { server devops:4004; }
    upstream suporte_app     { server suporte:4005; }
    upstream store_app       { server store:4006; }
    upstream developer_app   { server developer:4007; }

    # -------------------------------------------------------------------
    # Reusable proxy headers (included in each location)
    # -------------------------------------------------------------------
    # Proxy headers, WebSocket upgrade support and 30s timeouts are
    # applied inline on every location below.

    # -------------------------------------------------------------------
    # HTTP server (port 80)
    # -------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health probe (used by Docker healthcheck)
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ---------------- API gateway (NestJS services) ----------------
        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/rh/ {
            proxy_pass http://rh_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
