user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ---------- Core ----------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    client_max_body_size 25m;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---------- WebSocket upgrade map ----------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------------------
    # Upstreams - NestJS microservices (services/*)
    # -------------------------------------------------------------------
    upstream auth_service         { server auth-service:3001; }
    upstream rh_service           { server rh-service:3002; }
    upstream finance_service      { server finance-service:3003; }
    upstream projects_service     { server projects-service:3004; }
    upstream devops_service       { server devops-service:3005; }
    upstream support_service      { server support-service:3006; }
    upstream payments_service     { server payments-service:3007; }
    upstream notification_service { server notification-service:3008; }
    upstream license_service      { server license-service:3009; }
    upstream developer_service    { server developer-service:3010; }

    # -------------------------------------------------------------------
    # Upstreams - Next.js apps (apps/*)
    #
    # The module apps (rh / financeiro / projetos / devops / suporte /
    # developer) were retired and folded into `apps/web` under the
    # `/admin/...` and `/perfil/...` route trees. Only `web` and the
    # public planos/checkout SaaS `store` remain as distinct apps.
    # -------------------------------------------------------------------
    upstream web_app   { server web:4000; }
    upstream store_app { server store:4006; }

    # -------------------------------------------------------------------
    # Reusable proxy headers (included in each location)
    # -------------------------------------------------------------------
    # Proxy headers, WebSocket upgrade support and 30s timeouts are
    # applied inline on every location below.

    # -------------------------------------------------------------------
    # HTTP server (port 80)
    # -------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health probe (used by Docker healthcheck)
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ---------------- API documentation (Redoc + per-service Swagger) ----------------
        # Static Redoc page at `/docs` consumes the unified spec at
        # `/docs/openapi.unified.json`. Both files live under the
        # `docs/` directory at the repo root and are mounted into the
        # nginx container as a read-only volume. Run
        # `pnpm docs:generate` whenever a service API changes to
        # rebuild the unified spec before deploy.
        location = /docs {
            return 302 /docs/;
        }
        location = /docs/ {
            alias /usr/share/nginx/html/docs/;
            try_files /redoc.html =404;
            add_header Cache-Control "no-cache" always;
        }
        location = /docs/openapi.unified.json {
            alias /usr/share/nginx/html/docs/openapi.unified.json;
            default_type application/json;
            add_header Cache-Control "no-cache" always;
        }
        # Per-service Swagger UIs are reverse-proxied to the service
        # itself — each Nest app mounts the UI at `/{slug}/docs`. The
        # shared block below covers all eight; tighten with auth in
        # prod by toggling `EXPOSE_SWAGGER_IN_PROD` off and relying
        # only on the unified Redoc page (which lists endpoints but
        # doesn't expose the "Try it out" form).
        location ~ ^/(auth|rh|finance|projects|devops|support|payments|notification|license|developer)/docs(.*)$ {
            set $service $1;
            set $rest    $2;
            # Map URL slug to upstream name (replace dashes the
            # NestJS service names use vs. the slug we expose).
            if ($service = "auth")        { proxy_pass http://auth_service/$service/docs$rest;        }
            if ($service = "rh")          { proxy_pass http://rh_service/$service/docs$rest;          }
            if ($service = "finance")     { proxy_pass http://finance_service/$service/docs$rest;     }
            if ($service = "projects")    { proxy_pass http://projects_service/$service/docs$rest;    }
            if ($service = "devops")      { proxy_pass http://devops_service/$service/docs$rest;      }
            if ($service = "support")     { proxy_pass http://support_service/$service/docs$rest;     }
            if ($service = "payments")    { proxy_pass http://payments_service/$service/docs$rest;    }
            if ($service = "notification"){ proxy_pass http://notification_service/$service/docs$rest;}
            if ($service = "license")     { proxy_pass http://license_service/$service/docs$rest;     }
            if ($service = "developer")   { proxy_pass http://developer_service/$service/docs$rest;   }
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------- API gateway (NestJS services) ----------------
        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/rh/ {
            proxy_pass http://rh_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/finance/ {
            proxy_pass http://finance_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/projects/ {
            proxy_pass http://projects_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/devops/ {
            proxy_pass http://devops_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/support/ {
            proxy_pass http://support_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/payments/ {
            proxy_pass http://payments_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/license/ {
            proxy_pass http://license_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/developer/ {
            proxy_pass http://developer_service/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---------------- Public SaaS portal (planos / checkout) ----------------
        # The `store` app is the only Next.js surface besides `web` —
        # everything else (RH, Financeiro, Projetos, DevOps, Suporte,
        # Developer) lives inside `web` under `/admin/*` and `/perfil/*`.
        location /store/ {
            proxy_pass http://store_app/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---------------- Default: institutional site ----------------
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }

    # -------------------------------------------------------------------
    # HTTPS server (port 443)
    #
    # Place real certificates under ./certs (mounted at /etc/nginx/certs)
    # before enabling this server in production.
    # -------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/devtechs.crt;
        ssl_certificate_key /etc/nginx/certs/devtechs.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Delegate routing to the same rules as port 80.
        include /etc/nginx/conf.d/*.conf;

        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
