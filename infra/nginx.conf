worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # -------------------------------------------------------------
  # Upstream backend services (NestJS)
  # -------------------------------------------------------------
  upstream auth_service        { server host.docker.internal:4000; }
  upstream rh_service          { server host.docker.internal:4001; }
  upstream finance_service     { server host.docker.internal:4002; }
  upstream projects_service    { server host.docker.internal:4003; }
  upstream devops_service      { server host.docker.internal:4004; }
  upstream support_service     { server host.docker.internal:4005; }
  upstream payments_service    { server host.docker.internal:4006; }
  upstream notification_service{ server host.docker.internal:4007; }
  upstream license_service     { server host.docker.internal:4008; }
  upstream developer_service   { server host.docker.internal:4009; }

  # -------------------------------------------------------------
  # Upstream frontends (Next.js)
  # -------------------------------------------------------------
  upstream web_app        { server host.docker.internal:3000; }
  upstream rh_app         { server host.docker.internal:3001; }
  upstream financeiro_app { server host.docker.internal:3002; }
  upstream projetos_app   { server host.docker.internal:3003; }
  upstream devops_app     { server host.docker.internal:3004; }
  upstream suporte_app    { server host.docker.internal:3005; }
  upstream store_app      { server host.docker.internal:3006; }
  upstream developer_app  { server host.docker.internal:3007; }

  server {
    listen 80;
    server_name _;

    # API gateway routing
    location /api/auth/         { proxy_pass http://auth_service/; }
    location /api/rh/           { proxy_pass http://rh_service/; }
    location /api/finance/      { proxy_pass http://finance_service/; }
    location /api/projects/     { proxy_pass http://projects_service/; }
    location /api/devops/       { proxy_pass http://devops_service/; }
    location /api/support/      { proxy_pass http://support_service/; }
    location /api/payments/     { proxy_pass http://payments_service/; }
    location /api/notifications/{ proxy_pass http://notification_service/; }
    location /api/license/      { proxy_pass http://license_service/; }
    location /api/developer/    { proxy_pass http://developer_service/; }

    # Default -> web app
    location / {
      proxy_pass http://web_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
