user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ---------- Core ----------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    client_max_body_size 25m;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---------- WebSocket upgrade map ----------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------- Cloudflare real IP ----------
    # Restore the original visitor IP from the CF-Connecting-IP header so
    # logs and rate-limiting see the real client, not the Cloudflare edge.
    # Keep this list in sync with https://www.cloudflare.com/ips/
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # -------------------------------------------------------------------
    # DNS resolver — Docker's embedded DNS at 127.0.0.11.
    # Re-resolves upstream hostnames every 10 s so that container
    # restarts (which may assign a new IP) are picked up automatically.
    # The resolver is only used when proxy_pass contains a variable;
    # the upstream blocks below are kept solely for the Swagger if-proxy.
    # -------------------------------------------------------------------
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # -------------------------------------------------------------------
    # Upstreams — used ONLY by the Swagger if-proxy block below.
    # Regular API proxy locations use $variable + proxy_pass so that
    # the resolver above can refresh stale IPs on container restarts.
    # -------------------------------------------------------------------
    upstream auth_service         { server auth-service:3001; }
    upstream rh_service           { server rh-service:3002; }
    upstream finance_service      { server finance-service:3003; }
    upstream projects_service     { server projects-service:3004; }
    upstream devops_service       { server devops-service:3005; }
    upstream support_service      { server support-service:3006; }
    upstream payments_service     { server payments-service:3007; }
    upstream notification_service { server notification-service:3008; }
    upstream license_service      { server license-service:3009; }
    upstream developer_service    { server developer-service:3010; }

    # -------------------------------------------------------------------
    # Upstreams — Next.js apps (apps/*)
    # -------------------------------------------------------------------
    upstream web_app   { server web:4000; }
    upstream store_app { server store:4006; }

    # -------------------------------------------------------------------
    # HTTP (port 80) — redirect to HTTPS; health check stays on HTTP
    # so Docker's healthcheck probe doesn't need TLS.
    # -------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location = /health {
            access_log   off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------
    # HTTPS (port 443) — all application routes live here.
    #
    # TLS certificate: use a Cloudflare Origin Certificate (free, 15 yr).
    #   Cloudflare dashboard → SSL/TLS → Origin Server → Create Certificate
    #   Save the two files as:
    #     infra/certs/SZDevs.crt   (certificate + chain)
    #     infra/certs/SZDevs.key   (private key)
    #   Then set Cloudflare SSL/TLS mode to "Full (strict)".
    # -------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/SZDevs.crt;
        ssl_certificate_key /etc/nginx/certs/SZDevs.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---------- Health probe ----------
        location = /health {
            access_log   off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ---------- API documentation (Redoc + per-service Swagger) ----------
        # Static Redoc page at /docs reads the unified spec from
        # /docs/openapi.unified.json.  Both files are generated by
        # `pnpm docs:generate` at the repo root before each deploy.
        location = /docs {
            return 302 /docs/;
        }
        location = /docs/ {
            alias /usr/share/nginx/html/docs/;
            try_files /redoc.html =404;
            add_header Cache-Control "no-cache" always;
        }
        location = /docs/openapi.unified.json {
            alias /usr/share/nginx/html/docs/openapi.unified.json;
            default_type application/json;
            add_header Cache-Control "no-cache" always;
        }
        # Per-service Swagger UIs — proxy to each service's own /docs endpoint.
        location ~ ^/(auth|rh|finance|projects|devops|support|payments|notification|license|developer)/docs(.*)$ {
            set $service $1;
            set $rest    $2;
            if ($service = "auth")        { proxy_pass http://auth_service/$service/docs$rest;         }
            if ($service = "rh")          { proxy_pass http://rh_service/$service/docs$rest;           }
            if ($service = "finance")     { proxy_pass http://finance_service/$service/docs$rest;      }
            if ($service = "projects")    { proxy_pass http://projects_service/$service/docs$rest;     }
            if ($service = "devops")      { proxy_pass http://devops_service/$service/docs$rest;       }
            if ($service = "support")     { proxy_pass http://support_service/$service/docs$rest;      }
            if ($service = "payments")    { proxy_pass http://payments_service/$service/docs$rest;     }
            if ($service = "notification"){ proxy_pass http://notification_service/$service/docs$rest; }
            if ($service = "license")     { proxy_pass http://license_service/$service/docs$rest;      }
            if ($service = "developer")   { proxy_pass http://developer_service/$service/docs$rest;    }
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- API gateway — NestJS microservices ----------
        # Each location uses a $variable in proxy_pass so that nginx's
        # resolver (127.0.0.11, valid=10s) re-resolves service hostnames
        # periodically — container rebuilds that change the Docker IP are
        # picked up without reloading nginx.
        #
        # Locations that originally used `proxy_pass http://upstream/;`
        # (with a trailing slash to strip the location prefix) now use an
        # explicit rewrite to achieve the same path stripping.

        # Direct auth-service calls from browser (register, verify-email, etc.)
        location /api/auth/auth/ {
            set $svc auth-service:3001;
            rewrite ^/api/auth/auth/(.*) /auth/$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # NextAuth.js callbacks and session endpoints — handled by Next.js web app
        location /api/auth/ {
            set $svc web:4000;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/rh/ {
            set $svc rh-service:3002;
            rewrite ^/api/rh/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/finance/ {
            set $svc finance-service:3003;
            rewrite ^/api/finance/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/projects/ {
            set $svc projects-service:3004;
            rewrite ^/api/projects/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/devops/ {
            set $svc devops-service:3005;
            rewrite ^/api/devops/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/support/ {
            set $svc support-service:3006;
            rewrite ^/api/support/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/payments/ {
            set $svc payments-service:3007;
            rewrite ^/api/payments/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/notifications/ {
            set $svc notification-service:3008;
            rewrite ^/api/notifications/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/license/ {
            set $svc license-service:3009;
            rewrite ^/api/license/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/developer/ {
            set $svc developer-service:3010;
            rewrite ^/api/developer/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---------- Public SaaS portal (planos / checkout) ----------
        location /store/ {
            set $svc store:4006;
            rewrite ^/store/(.*) /$1 break;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---------- Default: institutional site / main web app ----------
        location / {
            set $svc web:4000;
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
