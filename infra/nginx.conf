    # -------------------------------------------------------------------
    # HTTPS server (port 443)
    #
    # Place real certificates under ./certs (mounted at /etc/nginx/certs)
    # before enabling this server in production.
    # -------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/devtechs.crt;
        ssl_certificate_key /etc/nginx/certs/devtechs.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Delegate routing to the same rules as port 80.
        include /etc/nginx/conf.d/*.conf;

        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
