user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    include       /etc/nginx/conf.d/*.conf;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    client_max_body_size 25m;

    # Docker internal DNS -- resolve upstreams at request time, not startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location = /health {
            access_log   off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/SZDevs.crt;
        ssl_certificate_key /etc/nginx/certs/SZDevs.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location = /health {
            access_log   off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location = /docs {
            return 302 /docs/;
        }
        location = /docs/ {
            alias /usr/share/nginx/html/docs/;
            try_files /redoc.html =404;
            add_header Cache-Control "no-cache" always;
        }
        location = /docs/openapi.unified.json {
            alias /usr/share/nginx/html/docs/openapi.unified.json;
            default_type application/json;
            add_header Cache-Control "no-cache" always;
        }

        location ~ ^/(auth|rh|finance|projects|devops|support|payments|notification|license|developer)/docs(.*)$ {
            set $service $1;
            set $rest    $2;
            set $svc_host "";
            if ($service = "auth")         { set $svc_host "auth-service:3001"; }
            if ($service = "rh")           { set $svc_host "rh-service:3002"; }
            if ($service = "finance")      { set $svc_host "finance-service:3003"; }
            if ($service = "projects")     { set $svc_host "projects-service:3004"; }
            if ($service = "devops")       { set $svc_host "devops-service:3005"; }
            if ($service = "support")      { set $svc_host "support-service:3006"; }
            if ($service = "payments")     { set $svc_host "payments-service:3007"; }
            if ($service = "notification") { set $svc_host "notification-service:3008"; }
            if ($service = "license")      { set $svc_host "license-service:3009"; }
            if ($service = "developer")    { set $svc_host "developer-service:3010"; }
            proxy_pass http://$svc_host/$service/docs$rest;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth/ {
            set $backend "http://auth-service:3001";
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /api/rh/ {
            set $backend "http://rh-service:3002";
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
