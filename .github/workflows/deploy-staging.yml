name: Deploy Â· Staging

on:
  push:
    branches: [develop]
  # Manual trigger so ops can redeploy a known-good commit without
  # pushing an empty commit to develop.
  workflow_dispatch:

# One staging deploy at a time, no cancellation: if two commits land
# in quick succession we want both to roll out in order, not the
# second to kill the first mid-SSH.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: 'true'

jobs:
  # -------------------------------------------------------------------
  # 1. detect-changes â€” compute the set of packages affected by this
  #    push using `turbo run build --filter=...[HEAD^1] --dry-run=json`.
  #    The `...[HEAD^1]` filter includes every package changed in the
  #    last commit PLUS every package that depends on one of them.
  #    We then jq-split the result into two JSON arrays (services vs
  #    apps) which feed the build matrices below.
  # -------------------------------------------------------------------
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
      apps: ${{ steps.changed.outputs.apps }}
      has-changes: ${{ steps.changed.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Compute affected packages
        id: changed
        run: |
          set -euo pipefail

          # Turbo dry-run emits the full task graph as JSON. The
          # `...[HEAD^1]` filter resolves to "every package changed
          # in HEAD plus all dependents". `|| true` lets the first
          # commit on a fresh branch gracefully return empty.
          JSON=$(pnpm turbo run build --filter='...[HEAD^1]' --dry-run=json 2>/dev/null || echo '{"packages":[]}')

          # Split into services (suffix -service) and apps (known
          # app workspaces). Using a regex on the package name is
          # faster than a second pnpm ls round-trip, and the list
          # of app names is stable.
          SERVICES=$(echo "$JSON" | jq -c '[.packages[] | select(endswith("-service"))]')
          APPS=$(echo "$JSON" | jq -c '[.packages[] | select(test("^@szdevs/(web|rh|financeiro|projetos|devops|suporte|store|developer)$"))]')

          # Any changes at all? Used to skip the deploy job entirely
          # when nothing needs redeploying.
          TOTAL=$(echo "$JSON" | jq '.packages | length')
          HAS="false"
          if [ "$TOTAL" -gt 0 ]; then HAS="true"; fi

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "has-changes=$HAS" >> "$GITHUB_OUTPUT"

          echo "â€” affected services: $SERVICES"
          echo "â€” affected apps:     $APPS"

  # -------------------------------------------------------------------
  # 2a. build-services â€” matrix job, one runner per affected service.
  #     Skipped entirely when the services array is empty.
  # -------------------------------------------------------------------
  build-services:
    name: Build service Â· ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: meta
        run: |
          # @szdevs/auth-service â†’ auth-service
          NAME=$(echo "${{ matrix.package }}" | sed 's|@szdevs/||')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_PREFIX }}/$NAME" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.service
          build-args: |
            PACKAGE_NAME=${{ matrix.package }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:staging
            ${{ steps.meta.outputs.image }}:staging-${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=${{ steps.meta.outputs.name }}
          cache-to: type=gha,scope=${{ steps.meta.outputs.name }},mode=max

  # -------------------------------------------------------------------
  # 2b. build-apps â€” same shape for Next.js apps.
  # -------------------------------------------------------------------
  build-apps:
    name: Build app Â· ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.apps) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: meta
        run: |
          NAME=$(echo "${{ matrix.package }}" | sed 's|@szdevs/||')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_PREFIX }}/$NAME" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          build-args: |
            PACKAGE_NAME=${{ matrix.package }}
            APP_NAME=${{ steps.meta.outputs.name }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:staging
            ${{ steps.meta.outputs.image }}:staging-${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=${{ steps.meta.outputs.name }}
          cache-to: type=gha,scope=${{ steps.meta.outputs.name }},mode=max

  # -------------------------------------------------------------------
  # 3. deploy â€” SSH into the staging VPS, pull the new images,
  #    restart the updated services, wait for health, notify Slack.
  #
  #    `environment: staging` binds the job to the Environments UI so
  #    ops can add reviewers / deploy branches protection rules later
  #    without touching the workflow file.
  # -------------------------------------------------------------------
  deploy:
    name: Deploy to staging
    needs: [detect-changes, build-services, build-apps]
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.has-changes == 'true' &&
      (needs.build-services.result == 'success' || needs.build-services.result == 'skipped') &&
      (needs.build-apps.result == 'success' || needs.build-apps.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.SZDevs.io
    steps:
      - name: Pull + restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/SZDevs
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker logout ghcr.io
            docker image prune -f

      - name: Wait for /health (60s timeout each)
        env:
          HOST: ${{ secrets.STAGING_HOST }}
        run: |
          set -euo pipefail

          # Hit each service's /health via the nginx gateway. 60s is
          # generous enough for cold starts on a small staging VPS.
          ENDPOINTS=(
            "https://${HOST}/api/auth/health"
            "https://${HOST}/api/rh/health"
            "https://${HOST}/api/finance/health"
            "https://${HOST}/api/projects/health"
            "https://${HOST}/api/devops/health"
            "https://${HOST}/api/support/health"
          )

          for URL in "${ENDPOINTS[@]}"; do
            echo "::group::Health-check $URL"
            OK="false"
            for i in $(seq 1 60); do
              if curl -fsS --max-time 3 "$URL" > /dev/null 2>&1; then
                echo "âœ“ healthy after ${i}s"
                OK="true"
                break
              fi
              sleep 1
            done
            echo "::endgroup::"
            if [ "$OK" != "true" ]; then
              echo "::error::$URL did not respond within 60s"
              exit 1
            fi
          done

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deploy *${{ job.status }}* â€” `${{ github.sha }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging deploy ${{ job.status }}*\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`> by ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
