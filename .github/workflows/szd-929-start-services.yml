name: "[SZD-929] Start services (no rebuild)"

on:
  workflow_dispatch:

jobs:
  start-services:
    name: Start NestJS services + verify MODULE_NOT_FOUND fixed
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and start services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/szdevs/infra

            echo "=== Starting all prod services (no rebuild) ==="
            docker compose --profile prod up -d --remove-orphans

            echo "=== Waiting 20s for services to stabilize ==="
            sleep 20

            echo "=== Container states ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep -i "szdevs\|infra" | head -30

            echo "=== Checking auth-service logs for MODULE_NOT_FOUND ==="
            docker logs SZDevs-auth-service --tail 30 2>&1 | grep -i "module_not_found\|Cannot find module" || echo "NO MODULE_NOT_FOUND in auth-service"

            echo "=== Checking all NestJS service logs for MODULE_NOT_FOUND ==="
            for svc in auth-service developer-service devops-service notification-service license-service finance-service payments-service projects-service support-service rh-service; do
              RESULT=$(docker logs SZDevs-$svc --tail 20 2>&1 | grep -i "Cannot find module" || true)
              if [ -n "$RESULT" ]; then
                echo "FAIL $svc: $RESULT"
              else
                echo "OK $svc: no MODULE_NOT_FOUND"
              fi
            done

            echo "=== HTTP health check ==="
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health 2>/dev/null || echo "000")
            echo "Health check HTTP: $HTTP"
