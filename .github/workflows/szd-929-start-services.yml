name: "[SZD-929] Start services (no rebuild)"

on:
  workflow_dispatch:

jobs:
  start-services:
    name: Start NestJS services + verify MODULE_NOT_FOUND fixed
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and start services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=== Starting NestJS services directly (bypassing compose/nginx conflict) ==="
            docker start \
              SZDevs-auth-service \
              SZDevs-developer-service \
              SZDevs-rh-service \
              SZDevs-devops-service \
              SZDevs-notification-service \
              SZDevs-license-service \
              SZDevs-finance-service \
              SZDevs-payments-service \
              SZDevs-projects-service \
              SZDevs-support-service \
              SZDevs-store \
              || true

            echo "=== Waiting 20s for services to stabilize ==="
            sleep 20

            echo "=== Container states ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep -i "szdevs\|infra" | head -20

            echo "=== Checking NestJS services for MODULE_NOT_FOUND ==="
            FAIL_COUNT=0
            for svc in auth-service developer-service devops-service notification-service license-service finance-service payments-service projects-service support-service rh-service; do
              RESULT=$(docker logs SZDevs-$svc --tail 30 2>&1 | grep -i "Cannot find module" || true)
              if [ -n "$RESULT" ]; then
                echo "FAIL $svc: $RESULT"
                FAIL_COUNT=$((FAIL_COUNT+1))
              else
                echo "OK $svc: no MODULE_NOT_FOUND"
              fi
            done

            echo "=== MODULE_NOT_FOUND failures: $FAIL_COUNT ==="
            echo "=== HTTP health check ==="
            curl -s -o /dev/null -w "Health HTTP: %{http_code}\n" http://localhost/health 2>/dev/null || echo "Health check failed"
