name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | selfsigned'
        required: false
        default: 'selfsigned'
        type: choice
        options:
          - diagnose
          - selfsigned

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      - name: Generate self-signed cert
        if: inputs.mode == 'selfsigned'
        run: |
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/SZDevs.key \
            -out /tmp/SZDevs.crt \
            -days 365 \
            -subj "/CN=szdevs.com/O=SZDevs/C=BR" \
            -addext "subjectAltName=DNS:szdevs.com,DNS:*.szdevs.com"
          echo "CERT_B64=$(base64 -w0 /tmp/SZDevs.crt)" >> "$GITHUB_ENV"
          echo "KEY_B64=$(base64 -w0 /tmp/SZDevs.key)" >> "$GITHUB_ENV"
          openssl x509 -in /tmp/SZDevs.crt -noout -dates -subject

      - name: Install cert and restart nginx
        if: inputs.mode == 'selfsigned'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 10m
          envs: CERT_B64,KEY_B64
          script: |
            set +e

            echo "=== Install certs to volume path ==="
            mkdir -p /home/deploy/szdevs-certs
            echo "$CERT_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.crt
            echo "$KEY_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.key
            docker run --rm \
              -v /home/deploy/szdevs-certs:/src:ro \
              -v /opt/szdevs/infra:/infra \
              alpine sh -c "mkdir -p /infra/certs && cp /src/SZDevs.crt /infra/certs/ && chmod 644 /infra/certs/SZDevs.crt && cp /src/SZDevs.key /infra/certs/ && chmod 644 /infra/certs/SZDevs.key && ls -la /infra/certs/"

            echo ""
            echo "=== Stop and remove stale nginx container ==="
            docker stop SZDevs-nginx 2>/dev/null && echo "stopped" || echo "was not running"
            docker rm SZDevs-nginx 2>/dev/null && echo "removed" || echo "did not exist"

            echo ""
            echo "=== Recreate nginx via compose ==="
            cd /opt/szdevs/infra
            docker compose --profile prod up -d --no-deps nginx 2>&1
            sleep 8

            echo ""
            echo "=== nginx container state ==="
            docker ps -a --filter name=SZDevs-nginx --format "{{.Names}} | {{.Status}} | {{.Ports}}"

            echo ""
            echo "=== nginx logs (last 30 lines) ==="
            docker logs --tail 30 SZDevs-nginx 2>&1 || echo "no logs"

            echo ""
            echo "=== ports ==="
            ss -tlnp | grep -E ':80 |:443 ' || echo "nothing on 80/443"

            echo ""
            echo "=== local health check ==="
            curl -sk --insecure -o /dev/null -w "https://127.0.0.1/health -> %{http_code}\n" https://127.0.0.1/health || true
            curl -sk -o /dev/null -w "http://127.0.0.1/health -> %{http_code}\n" http://127.0.0.1/health || true
        env:
          CERT_B64: ${{ env.CERT_B64 }}
          KEY_B64: ${{ env.KEY_B64 }}

      - name: Diagnose only
        if: inputs.mode == 'diagnose'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e
            docker ps -a
            docker logs --tail 30 SZDevs-nginx 2>&1 || echo "no nginx logs"
            ss -tlnp | grep -E ':80 |:443 ' || echo "nothing on 80/443"
            ls -la /opt/szdevs/infra/certs/
            exit 0

      - name: Verify externally
        run: |
          sleep 15
          echo "=== TLS direct ==="
          echo | timeout 20 openssl s_client -connect 76.13.165.130:443 -servername szdevs.com 2>&1 \
            | grep -E "CONNECTED|subject|error|alert|DONE" || echo "TLS: timeout or no match"
          echo ""
          echo "=== via Cloudflare ==="
          curl -sS -o /dev/null -w "szdevs.com/health -> %{http_code}\n" --max-time 25 "https://szdevs.com/health" 2>&1 || echo "curl failed"
          curl -sS -o /dev/null -w "szdevs.com/forgot-password -> %{http_code}\n" --max-time 25 "https://szdevs.com/forgot-password" 2>&1 || echo "curl failed"
