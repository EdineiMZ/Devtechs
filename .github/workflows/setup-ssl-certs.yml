name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | selfsigned | restore-nginx'
        required: false
        default: 'selfsigned'
        type: choice
        options:
          - diagnose
          - selfsigned
          - restore-nginx

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      - name: Generate self-signed cert (runner)
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        run: |
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/SZDevs.key \
            -out /tmp/SZDevs.crt \
            -days 365 \
            -subj "/CN=szdevs.com/O=SZDevs/C=BR" \
            -addext "subjectAltName=DNS:szdevs.com,DNS:*.szdevs.com"

          echo "CERT_B64=$(base64 -w0 /tmp/SZDevs.crt)" >> "$GITHUB_ENV"
          echo "KEY_B64=$(base64 -w0 /tmp/SZDevs.key)"  >> "$GITHUB_ENV"

          echo "=== Generated cert info ==="
          openssl x509 -in /tmp/SZDevs.crt -noout -dates -subject

      - name: Diagnose VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e

            echo "=== System state ==="
            hostname; uptime; id

            echo ""
            echo "=== Cert directory ==="
            ls -la /opt/szdevs/infra/certs/ 2>/dev/null || echo "CERTS_DIR_NOT_FOUND"

            echo ""
            echo "=== Who owns port 80 ==="
            ss -tlnp | grep ':80 ' || echo "nothing on port 80"

            echo ""
            echo "=== Who owns port 443 ==="
            ss -tlnp | grep ':443 ' || echo "nothing on port 443"

            echo ""
            echo "=== ALL running Docker containers ==="
            docker ps --format "{{.Names}} | {{.Status}} | {{.Ports}}"

            echo ""
            echo "=== Stopped containers ==="
            docker ps -a --filter status=exited --format "{{.Names}} | {{.Status}}" | head -10

            echo ""
            echo "=== SZDevs-nginx logs ==="
            docker logs SZDevs-nginx --tail=20 2>&1 || echo "SZDevs-nginx: no such container"

            echo ""
            echo "=== Local TLS test on 127.0.0.1:443 ==="
            echo | timeout 8 openssl s_client -connect 127.0.0.1:443 -servername szdevs.com 2>&1 | grep -E "CONNECTED|verify|issuer|subject|DONE|error|SSL|TLS" || echo "TLS test failed"

            exit 0

      - name: Find and reload nginx (any container using nginx image)
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e

            echo "=== Find nginx container by image ==="
            NGINX_ID=$(docker ps --filter ancestor=nginx --format "{{.ID}}" | head -1)
            NGINX_NAME=$(docker ps --filter ancestor=nginx --format "{{.Names}}" | head -1)
            echo "nginx container: ID=$NGINX_ID NAME=$NGINX_NAME"

            if [ -n "$NGINX_ID" ]; then
              echo "=== Test nginx config ==="
              docker exec "$NGINX_ID" nginx -t 2>&1

              echo "=== Reload nginx ==="
              docker exec "$NGINX_ID" nginx -s reload 2>&1
              echo "nginx reloaded in $NGINX_NAME"
            else
              echo "No running nginx container found by image filter"
              echo "Trying by name pattern..."
              NGINX_ID2=$(docker ps --format "{{.ID}} {{.Names}}" | grep -i nginx | awk '{print $1}' | head -1)
              NGINX_NAME2=$(docker ps --format "{{.ID}} {{.Names}}" | grep -i nginx | awk '{print $2}' | head -1)
              echo "by name: ID=$NGINX_ID2 NAME=$NGINX_NAME2"
              if [ -n "$NGINX_ID2" ]; then
                docker exec "$NGINX_ID2" nginx -t 2>&1
                docker exec "$NGINX_ID2" nginx -s reload 2>&1
                echo "reloaded $NGINX_NAME2"
              else
                echo "No nginx container found at all"
              fi
            fi

      - name: Install cert on VPS via SSH
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          envs: CERT_B64,KEY_B64
          script: |
            set -euo pipefail

            mkdir -p /home/deploy/szdevs-certs
            echo "$CERT_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.crt
            echo "$KEY_B64"  | base64 -d > /home/deploy/szdevs-certs/SZDevs.key
            chmod 644 /home/deploy/szdevs-certs/SZDevs.crt
            chmod 600 /home/deploy/szdevs-certs/SZDevs.key
            echo "Staging cert:"
            openssl x509 -in /home/deploy/szdevs-certs/SZDevs.crt -noout -dates -subject

            docker run --rm \
              -v /home/deploy/szdevs-certs:/certs-src:ro \
              -v /opt/szdevs/infra:/infra \
              alpine sh -c "
                mkdir -p /infra/certs &&
                cp /certs-src/SZDevs.crt /infra/certs/SZDevs.crt &&
                chmod 644 /infra/certs/SZDevs.crt &&
                cp /certs-src/SZDevs.key /infra/certs/SZDevs.key &&
                chmod 600 /infra/certs/SZDevs.key &&
                echo 'Certs installed:' &&
                ls -la /infra/certs/
              "
        env:
          CERT_B64: ${{ env.CERT_B64 }}
          KEY_B64: ${{ env.KEY_B64 }}

      - name: Verify HTTPS externally (from runner)
        run: |
          sleep 10

          echo "=== TLS direct to VPS IP ==="
          echo | timeout 20 openssl s_client -connect 76.13.165.130:443 -servername szdevs.com 2>&1 \
            | grep -E "CONNECTED|subject|issuer|verify|error|SSL|notBefore|notAfter|DONE" \
            || echo "Direct TLS to VPS failed"

          echo ""
          echo "=== HTTP status via szdevs.com ==="
          curl -sS -o /dev/null -w "szdevs.com/health -> %{http_code}\n" --max-time 20 "https://szdevs.com/health" 2>&1 || echo "szdevs.com/health: failed"
          curl -sS -o /dev/null -w "szdevs.com/forgot-password -> %{http_code}\n" --max-time 20 "https://szdevs.com/forgot-password" 2>&1 || echo "szdevs.com/forgot-password: failed"
