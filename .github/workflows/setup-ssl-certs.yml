name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | selfsigned'
        required: false
        default: 'selfsigned'
        type: choice
        options:
          - diagnose
          - selfsigned

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      - name: Generate self-signed cert
        if: inputs.mode == 'selfsigned'
        run: |
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/SZDevs.key \
            -out /tmp/SZDevs.crt \
            -days 365 \
            -subj "/CN=szdevs.com/O=SZDevs/C=BR" \
            -addext "subjectAltName=DNS:szdevs.com,DNS:*.szdevs.com"
          echo "CERT_B64=$(base64 -w0 /tmp/SZDevs.crt)" >> "$GITHUB_ENV"
          echo "KEY_B64=$(base64 -w0 /tmp/SZDevs.key)" >> "$GITHUB_ENV"
          openssl x509 -in /tmp/SZDevs.crt -noout -dates -subject

      - name: Diagnose VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e
            echo "=== ALL containers any state ==="
            docker ps -a
            echo ""
            echo "=== nginx by image ==="
            docker ps -a --format "{{.Names}} | {{.Image}} | {{.Status}}" | grep -i nginx || echo "no nginx containers found"
            echo ""
            echo "=== Port 80 and 443 ==="
            ss -tlnp | grep -E ':80 |:443 '
            echo ""
            echo "=== Certs dir ==="
            ls -la /opt/szdevs/infra/certs/ 2>/dev/null || echo "certs dir not found"
            echo ""
            echo "=== sudo check ==="
            sudo -n true 2>&1 && echo "passwordless sudo YES" || echo "passwordless sudo NO"
            exit 0

      - name: Install cert and reload nginx
        if: inputs.mode == 'selfsigned'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 10m
          envs: CERT_B64,KEY_B64
          script: |
            set +e
            mkdir -p /home/deploy/szdevs-certs
            echo "$CERT_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.crt
            echo "$KEY_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.key
            docker run --rm \
              -v /home/deploy/szdevs-certs:/src:ro \
              -v /opt/szdevs/infra:/infra \
              alpine sh -c "mkdir -p /infra/certs && cp /src/SZDevs.crt /infra/certs/ && chmod 644 /infra/certs/SZDevs.crt && cp /src/SZDevs.key /infra/certs/ && chmod 600 /infra/certs/SZDevs.key && ls -la /infra/certs/"
            NGINX_NAME=$(docker ps -a --format "{{.Names}}" | grep -i nginx | head -1)
            echo "nginx container: $NGINX_NAME"
            if docker ps --filter name="$NGINX_NAME" --filter status=running -q 2>/dev/null | grep -q .; then
              echo "nginx running: reloading"
              docker exec "$NGINX_NAME" nginx -t 2>&1
              docker exec "$NGINX_NAME" nginx -s reload 2>&1
            elif [ -n "$NGINX_NAME" ]; then
              echo "nginx exists not running: starting"
              docker start "$NGINX_NAME" 2>&1
              sleep 5
              docker exec "$NGINX_NAME" nginx -t 2>&1 || true
            else
              echo "no nginx container: compose up"
              cd /opt/szdevs/infra && docker compose --profile prod up -d --no-deps nginx 2>&1 || true
            fi
            echo ""
            echo "=== Result ==="
            docker ps --format "{{.Names}} | {{.Status}} | {{.Ports}}" | grep -i nginx || echo "nginx not running"
            curl -sk --insecure -o /dev/null -w "local https: %{http_code}\n" https://127.0.0.1/health || true
        env:
          CERT_B64: ${{ env.CERT_B64 }}
          KEY_B64: ${{ env.KEY_B64 }}

      - name: Verify externally
        run: |
          sleep 10
          echo "=== TLS direct ==="
          echo | timeout 20 openssl s_client -connect 76.13.165.130:443 -servername szdevs.com 2>&1 | grep -E "CONNECTED|subject|error|alert|DONE"
          echo ""
          echo "=== via Cloudflare ==="
          curl -sS -o /dev/null -w "szdevs.com/health -> %{http_code}\n" --max-time 20 "https://szdevs.com/health" || true
          curl -sS -o /dev/null -w "szdevs.com/forgot-password -> %{http_code}\n" --max-time 20 "https://szdevs.com/forgot-password" || true
