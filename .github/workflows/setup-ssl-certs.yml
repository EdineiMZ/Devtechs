name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | selfsigned | restore-nginx'
        required: false
        default: 'selfsigned'
        type: choice
        options:
          - diagnose
          - selfsigned
          - restore-nginx

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      - name: Generate self-signed cert (runner)
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        run: |
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/SZDevs.key \
            -out /tmp/SZDevs.crt \
            -days 365 \
            -subj "/CN=szdevs.com/O=SZDevs/C=BR" \
            -addext "subjectAltName=DNS:szdevs.com,DNS:*.szdevs.com"

          echo "CERT_B64=$(base64 -w0 /tmp/SZDevs.crt)" >> "$GITHUB_ENV"
          echo "KEY_B64=$(base64 -w0 /tmp/SZDevs.key)"  >> "$GITHUB_ENV"

          echo "=== Generated cert info ==="
          openssl x509 -in /tmp/SZDevs.crt -noout -dates -subject

      - name: Diagnose VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e

            echo "=== Cert directory ==="
            ls -la /opt/szdevs/infra/certs/ 2>/dev/null || echo "CERTS_DIR_NOT_FOUND"

            echo ""
            echo "=== Who owns port 80 ==="
            ss -tlnp | grep ':80 ' || echo "nothing on port 80"

            echo ""
            echo "=== Who owns port 443 ==="
            ss -tlnp | grep ':443 ' || echo "nothing on port 443"

            echo ""
            echo "=== ALL running Docker containers ==="
            docker ps --format "{{.Names}} | {{.Status}} | {{.Ports}}"

            echo ""
            echo "=== Host nginx config ==="
            nginx -t 2>&1 || true
            ls /etc/nginx/sites-enabled/ 2>/dev/null || echo "no sites-enabled"
            ls /etc/nginx/certs/ 2>/dev/null || echo "no /etc/nginx/certs/"
            cat /etc/nginx/nginx.conf 2>/dev/null | head -20 || true

            echo ""
            echo "=== deploy sudo capabilities ==="
            sudo -l 2>&1 | head -10 || echo "no sudo"

            exit 0

      - name: Fix host nginx SSL certs
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          envs: CERT_B64,KEY_B64
          script: |
            set +e

            echo "=== Install certs to docker volume path ==="
            mkdir -p /home/deploy/szdevs-certs
            echo "$CERT_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.crt
            echo "$KEY_B64"  | base64 -d > /home/deploy/szdevs-certs/SZDevs.key

            docker run --rm \
              -v /home/deploy/szdevs-certs:/certs-src:ro \
              -v /opt/szdevs/infra:/infra \
              alpine sh -c "
                mkdir -p /infra/certs &&
                cp /certs-src/SZDevs.crt /infra/certs/SZDevs.crt &&
                chmod 644 /infra/certs/SZDevs.crt &&
                cp /certs-src/SZDevs.key /infra/certs/SZDevs.key &&
                chmod 600 /infra/certs/SZDevs.key &&
                ls -la /infra/certs/
              "

            echo ""
            echo "=== Try to install certs to /etc/nginx/certs/ via sudo ==="
            if sudo -l 2>&1 | grep -q nginx; then
              echo "sudo nginx access found"
              sudo mkdir -p /etc/nginx/certs
              sudo cp /home/deploy/szdevs-certs/SZDevs.crt /etc/nginx/certs/SZDevs.crt
              sudo cp /home/deploy/szdevs-certs/SZDevs.key /etc/nginx/certs/SZDevs.key
              sudo chmod 644 /etc/nginx/certs/SZDevs.crt
              sudo chmod 600 /etc/nginx/certs/SZDevs.key
              echo "Certs copied to /etc/nginx/certs/"
              sudo nginx -t && sudo nginx -s reload && echo "nginx reloaded"
            else
              echo "No direct sudo nginx -- trying tee approach"
              echo "$CERT_B64" | base64 -d | sudo tee /etc/nginx/certs/SZDevs.crt > /dev/null 2>&1 && echo "cert written via tee"
              echo "$KEY_B64"  | base64 -d | sudo tee /etc/nginx/certs/SZDevs.key > /dev/null 2>&1 && echo "key written via tee"
              sudo nginx -t 2>&1 && sudo nginx -s reload 2>&1 && echo "nginx reloaded"
            fi

            echo ""
            echo "=== Try reload via sudoers nginx reload ==="
            sudo systemctl reload nginx 2>&1 || sudo service nginx reload 2>&1 || true
        env:
          CERT_B64: ${{ env.CERT_B64 }}
          KEY_B64: ${{ env.KEY_B64 }}

      - name: Verify HTTPS externally (from runner)
        run: |
          sleep 10

          echo "=== TLS direct to VPS IP ==="
          echo | timeout 20 openssl s_client -connect 76.13.165.130:443 -servername szdevs.com 2>&1 \
            | grep -E "CONNECTED|subject|issuer|error|SSL|notBefore|notAfter|DONE|alert" \
            || echo "Direct TLS to VPS failed"

          echo ""
          echo "=== HTTP status via szdevs.com ==="
          curl -sS -o /dev/null -w "szdevs.com/health -> %{http_code}\n" --max-time 20 "https://szdevs.com/health" 2>&1 || true
          curl -sS -o /dev/null -w "szdevs.com/forgot-password -> %{http_code}\n" --max-time 20 "https://szdevs.com/forgot-password" 2>&1 || true
