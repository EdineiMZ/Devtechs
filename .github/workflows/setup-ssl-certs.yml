name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | selfsigned | restore-nginx'
        required: false
        default: 'selfsigned'
        type: choice
        options:
          - diagnose
          - selfsigned
          - restore-nginx

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      - name: Generate self-signed cert (runner)
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        run: |
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/SZDevs.key \
            -out /tmp/SZDevs.crt \
            -days 365 \
            -subj "/CN=szdevs.com/O=SZDevs/C=BR" \
            -addext "subjectAltName=DNS:szdevs.com,DNS:*.szdevs.com"

          echo "CERT_B64=$(base64 -w0 /tmp/SZDevs.crt)" >> "$GITHUB_ENV"
          echo "KEY_B64=$(base64 -w0 /tmp/SZDevs.key)"  >> "$GITHUB_ENV"

          echo "=== Generated cert info ==="
          openssl x509 -in /tmp/SZDevs.crt -noout -dates -subject

      - name: Diagnose - all containers and port owners
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e

            echo "=== ALL docker containers (any state) ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"

            echo ""
            echo "=== Find nginx in container names or image ==="
            docker ps -a --format "{{.Names}} {{.Image}} {{.Status}}" | grep -i nginx || echo "no nginx containers"

            echo ""
            echo "=== Port 80 and 443 listeners ==="
            ss -tlnp | grep -E ':80 |:443 '

            echo ""
            echo "=== Certs dir ==="
            ls -la /opt/szdevs/infra/certs/

            echo ""
            echo "=== Docker networks ==="
            docker network ls

            echo ""
            echo "=== docker ps -a full output ==="
            docker ps -a

            exit 0

      - name: Fix: stop port-80/443 holder, install cert, start nginx
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 10m
          envs: CERT_B64,KEY_B64
          script: |
            set +e

            echo "=== Install fresh cert to /opt/szdevs/infra/certs/ ==="
            mkdir -p /home/deploy/szdevs-certs
            echo "$CERT_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.crt
            echo "$KEY_B64"  | base64 -d > /home/deploy/szdevs-certs/SZDevs.key

            docker run --rm \
              -v /home/deploy/szdevs-certs:/certs-src:ro \
              -v /opt/szdevs/infra:/infra \
              alpine sh -c "
                mkdir -p /infra/certs &&
                cp /certs-src/SZDevs.crt /infra/certs/SZDevs.crt &&
                chmod 644 /infra/certs/SZDevs.crt &&
                cp /certs-src/SZDevs.key /infra/certs/SZDevs.key &&
                chmod 600 /infra/certs/SZDevs.key &&
                ls -la /infra/certs/
              "

            echo ""
            echo "=== Find nginx container (by image) ==="
            NGINX_ID=$(docker ps -a --filter ancestor=nginx -q | head -1)
            NGINX_NAME=$(docker ps -a --filter ancestor=nginx --format "{{.Names}}" | head -1)
            echo "nginx container: $NGINX_ID / $NGINX_NAME"

            echo ""
            echo "=== Reload nginx if running or start it ==="
            if docker ps --filter name="$NGINX_NAME" --filter status=running -q | grep -q .; then
              echo "nginx is running: $NGINX_NAME - reloading"
              docker exec "$NGINX_NAME" nginx -t 2>&1
              docker exec "$NGINX_NAME" nginx -s reload 2>&1
              echo "reloaded"
            elif [ -n "$NGINX_ID" ]; then
              echo "nginx container exists but not running: $NGINX_NAME - restarting"
              docker restart "$NGINX_NAME" 2>&1
              sleep 3
              docker exec "$NGINX_NAME" nginx -s reload 2>&1 || true
            else
              echo "=== No nginx container - starting via compose ==="
              cd /opt/szdevs/infra
              docker compose --profile prod up -d --no-deps nginx 2>&1 || true
            fi

            echo ""
            echo "=== Final state ==="
            docker ps --filter name=nginx --format "{{.Names}} {{.Status}} {{.Ports}}"
            ss -tlnp | grep -E ':443|:80 '
            curl -sk -o /dev/null -w "https://127.0.0.1/health -> %{http_code}\n" --insecure https://127.0.0.1/health || true
        env:
          CERT_B64: ${{ env.CERT_B64 }}
          KEY_B64: ${{ env.KEY_B64 }}

      - name: Verify HTTPS externally (from runner)
        run: |
          sleep 10

          echo "=== TLS direct to VPS IP ==="
          echo | timeout 20 openssl s_client -connect 76.13.165.130:443 -servername szdevs.com 2>&1 \
            | grep -E "CONNECTED|subject|issuer|error|alert|notBefore|notAfter|DONE"

          echo ""
          echo "=== HTTP status via szdevs.com ==="
          curl -sS -o /dev/null -w "szdevs.com/health -> %{http_code}\n" --max-time 20 "https://szdevs.com/health" 2>&1 || true
          curl -sS -o /dev/null -w "szdevs.com/forgot-password -> %{http_code}\n" --max-time 20 "https://szdevs.com/forgot-password" 2>&1 || true
