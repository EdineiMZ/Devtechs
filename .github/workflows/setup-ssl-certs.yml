name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | selfsigned | restore-nginx'
        required: false
        default: 'selfsigned'
        type: choice
        options:
          - diagnose
          - selfsigned
          - restore-nginx

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      # -----------------------------------------------------------------------
      # Step 0: Generate self-signed cert ON THE RUNNER (no VPS DNS needed)
      # -----------------------------------------------------------------------
      - name: Generate self-signed cert (runner)
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        run: |
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/SZDevs.key \
            -out /tmp/SZDevs.crt \
            -days 365 \
            -subj "/CN=szdevs.com/O=SZDevs/C=BR" \
            -addext "subjectAltName=DNS:szdevs.com,DNS:*.szdevs.com"

          echo "CERT_B64=$(base64 -w0 /tmp/SZDevs.crt)" >> "$GITHUB_ENV"
          echo "KEY_B64=$(base64 -w0 /tmp/SZDevs.key)"  >> "$GITHUB_ENV"

          echo "=== Generated cert info ==="
          openssl x509 -in /tmp/SZDevs.crt -noout -dates -subject

      # -----------------------------------------------------------------------
      # Step 1: Fix VPS DNS + diagnose
      # -----------------------------------------------------------------------
      - name: Fix DNS and diagnose VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          password: ${{ secrets.PROD_ROOT_PASS }}
          command_timeout: 2m
          script: |
            set -euo pipefail

            echo "=== Fixing DNS first (no external lookup needed) ==="
            printf 'nameserver 8.8.8.8\nnameserver 1.1.1.1\n' > /etc/resolv.conf
            echo "DNS fixed."

            echo ""
            echo "=== System state ==="
            hostname; uptime

            echo ""
            echo "=== Cert directory ==="
            ls -la /opt/szdevs/infra/certs/ 2>/dev/null || echo "CERTS_DIR_NOT_FOUND"

            echo ""
            echo "=== Nginx container ==="
            docker ps --filter name=SZDevs-nginx --format "Name={{.Names}} Status={{.Status}}"

            echo ""
            echo "=== Port 443 ==="
            ss -tlnp 2>/dev/null | grep :443 || echo "PORT_443_NOT_LISTENING"

            echo ""
            echo "=== Nginx last 10 log lines ==="
            docker logs SZDevs-nginx --tail 10 2>/dev/null || echo "container not running"

      # -----------------------------------------------------------------------
      # Step 2: Install cert on VPS (pass base64-encoded from runner)
      # -----------------------------------------------------------------------
      - name: Install cert on VPS via SSH
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          password: ${{ secrets.PROD_ROOT_PASS }}
          command_timeout: 3m
          envs: CERT_B64,KEY_B64
          script: |
            set -euo pipefail

            mkdir -p /opt/szdevs/infra/certs

            echo "$CERT_B64" | base64 -d > /opt/szdevs/infra/certs/SZDevs.crt
            echo "$KEY_B64"  | base64 -d > /opt/szdevs/infra/certs/SZDevs.key

            chmod 644 /opt/szdevs/infra/certs/SZDevs.crt
            chmod 600 /opt/szdevs/infra/certs/SZDevs.key

            echo "Cert written:"
            ls -la /opt/szdevs/infra/certs/
            openssl x509 -in /opt/szdevs/infra/certs/SZDevs.crt -noout -dates -subject

        env:
          CERT_B64: ${{ env.CERT_B64 }}
          KEY_B64: ${{ env.KEY_B64 }}

      # -----------------------------------------------------------------------
      # Step 3: Start/reload nginx
      # -----------------------------------------------------------------------
      - name: Start and reload nginx
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          password: ${{ secrets.PROD_ROOT_PASS }}
          command_timeout: 3m
          script: |
            set -euo pipefail

            cd /opt/szdevs/infra

            echo "=== Testing nginx config ==="
            docker compose --profile prod exec -T nginx nginx -t 2>&1 || true

            echo "=== Ensuring nginx is up ==="
            docker compose --profile prod up -d nginx 2>&1
            sleep 5

            echo "=== Reloading nginx ==="
            docker compose --profile prod exec -T nginx nginx -s reload 2>&1 || true

            echo "=== Port 443 after reload ==="
            ss -tlnp | grep :443 || echo "PORT_443_STILL_NOT_LISTENING"

            echo "=== Nginx status ==="
            docker ps --filter name=SZDevs-nginx --format "Status: {{.Status}}"

      # -----------------------------------------------------------------------
      # Step 4: Verify HTTPS from runner (external)
      # -----------------------------------------------------------------------
      - name: Verify HTTPS externally (from runner)
        run: |
          echo "=== Waiting 10s ==="
          sleep 10

          echo "=== TLS handshake to szdevs.com ==="
          echo | timeout 20 openssl s_client -connect szdevs.com:443 -servername szdevs.com 2>/dev/null \
            | openssl x509 -noout -dates -subject 2>/dev/null \
            || echo "TLS FAILED (may still be 522 if CF mode is Full strict with self-signed)"

          echo ""
          echo "=== TLS direct to VPS IP (bypasses Cloudflare) ==="
          echo | timeout 20 openssl s_client -connect ${{ secrets.PROD_HOST }}:443 -servername szdevs.com 2>/dev/null \
            | openssl x509 -noout -dates 2>/dev/null \
            || echo "Direct TLS to VPS also failed"

          echo ""
          echo "=== HTTP status via szdevs.com ==="
          curl -fsS -o /dev/null -w "szdevs.com/health -> %{http_code}\n" --max-time 20 "https://szdevs.com/health" 2>/dev/null || true
          curl -fsS -o /dev/null -w "szdevs.com/forgot-password -> %{http_code}\n" --max-time 20 "https://szdevs.com/forgot-password" 2>/dev/null || true