name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | selfsigned | restore-nginx'
        required: false
        default: 'selfsigned'
        type: choice
        options:
          - diagnose
          - selfsigned
          - restore-nginx

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      - name: Generate self-signed cert (runner)
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        run: |
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/SZDevs.key \
            -out /tmp/SZDevs.crt \
            -days 365 \
            -subj "/CN=szdevs.com/O=SZDevs/C=BR" \
            -addext "subjectAltName=DNS:szdevs.com,DNS:*.szdevs.com"

          echo "CERT_B64=$(base64 -w0 /tmp/SZDevs.crt)" >> "$GITHUB_ENV"
          echo "KEY_B64=$(base64 -w0 /tmp/SZDevs.key)"  >> "$GITHUB_ENV"

          echo "=== Generated cert info ==="
          openssl x509 -in /tmp/SZDevs.crt -noout -dates -subject

      - name: Diagnose VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 2m
          script: |
            set +e

            echo "=== System state ==="
            hostname; uptime; id

            echo ""
            echo "=== Cert directory ==="
            ls -la /opt/szdevs/infra/certs/ 2>/dev/null || echo "CERTS_DIR_NOT_FOUND"

            echo ""
            echo "=== Containers (all) ==="
            docker ps -a --format "{{.Names}} {{.Status}}" 2>/dev/null || echo "docker ps failed"

            echo ""
            echo "=== Port 443 ==="
            ss -tlnp 2>/dev/null | grep :443 || echo "PORT_443_NOT_LISTENING"

            exit 0

      - name: Install cert on VPS via SSH
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          envs: CERT_B64,KEY_B64
          script: |
            set -euo pipefail

            mkdir -p /home/deploy/szdevs-certs
            echo "$CERT_B64" | base64 -d > /home/deploy/szdevs-certs/SZDevs.crt
            echo "$KEY_B64"  | base64 -d > /home/deploy/szdevs-certs/SZDevs.key
            chmod 644 /home/deploy/szdevs-certs/SZDevs.crt
            chmod 600 /home/deploy/szdevs-certs/SZDevs.key
            echo "Staging cert:"
            openssl x509 -in /home/deploy/szdevs-certs/SZDevs.crt -noout -dates -subject

            docker run --rm \
              -v /home/deploy/szdevs-certs:/certs-src:ro \
              -v /opt/szdevs/infra:/infra \
              alpine sh -c "
                mkdir -p /infra/certs &&
                cp /certs-src/SZDevs.crt /infra/certs/SZDevs.crt &&
                chmod 644 /infra/certs/SZDevs.crt &&
                cp /certs-src/SZDevs.key /infra/certs/SZDevs.key &&
                chmod 600 /infra/certs/SZDevs.key &&
                echo 'Certs installed:' &&
                ls -la /infra/certs/
              "
        env:
          CERT_B64: ${{ env.CERT_B64 }}
          KEY_B64: ${{ env.KEY_B64 }}

      - name: Start all services (including nginx)
        if: inputs.mode == 'selfsigned' || inputs.mode == 'restore-nginx'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail

            cd /opt/szdevs/infra

            echo "=== Starting all prod services (no rebuild) ==="
            docker compose --profile prod up -d --remove-orphans 2>&1

            echo "=== Waiting 15s for nginx to start ==="
            sleep 15

            echo "=== Port 443 after start ==="
            ss -tlnp | grep :443 || echo "PORT_443_STILL_NOT_LISTENING"

            echo "=== Nginx status ==="
            docker ps --filter name=SZDevs-nginx --format "Status: {{.Status}}"

            echo "=== HTTP health check ==="
            curl -s -o /dev/null -w "localhost/health -> %{http_code}\n" http://localhost/health 2>/dev/null || echo "health check failed"

      - name: Verify HTTPS externally (from runner)
        run: |
          sleep 10

          echo "=== TLS direct to VPS IP ==="
          echo | timeout 20 openssl s_client -connect 76.13.165.130:443 -servername szdevs.com 2>/dev/null \
            | openssl x509 -noout -dates 2>/dev/null \
            || echo "Direct TLS to VPS failed"

          echo ""
          echo "=== HTTP status via szdevs.com ==="
          curl -fsS -o /dev/null -w "szdevs.com/health -> %{http_code}\n" --max-time 20 "https://szdevs.com/health" 2>/dev/null || true
          curl -fsS -o /dev/null -w "szdevs.com/forgot-password -> %{http_code}\n" --max-time 20 "https://szdevs.com/forgot-password" 2>/dev/null || true
