name: Fix SSL - Emergency Cert Install (SZD-818)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: diagnose | verify'
        required: false
        default: 'verify'
        type: choice
        options:
          - diagnose
          - verify

jobs:
  fix-ssl:
    name: Emergency SSL Fix
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://szdevs.com

    steps:
      - name: Verify nginx and Cloudflare
        if: inputs.mode == 'verify'
        run: |
          echo "=== TLS direct to VPS (bypasses Cloudflare) ==="
          echo | timeout 15 openssl s_client -connect 76.13.165.130:443 -servername szdevs.com 2>&1 \
            | grep -E "CONNECTED|subject|error|alert|DONE" || echo "TLS: timeout or no match"
          echo ""
          echo "=== HTTP direct to VPS ==="
          curl -sS -o /dev/null -w "direct http://76.13.165.130/health -> %{http_code}\n" \
            -H "Host: szdevs.com" --max-time 10 http://76.13.165.130/health || echo "http direct failed"
          echo ""
          echo "=== HTTPS direct to VPS (self-signed, skip cert verify) ==="
          curl -sk -o /dev/null -w "direct https://76.13.165.130/health -> %{http_code}\n" \
            -H "Host: szdevs.com" --max-time 10 https://76.13.165.130/health || echo "https direct failed"
          echo ""
          echo "=== Response headers from Cloudflare ==="
          curl -sS -I --max-time 20 "https://szdevs.com/health" 2>&1 || echo "curl failed"
          echo ""
          echo "=== Response headers direct ==="
          curl -sk -I -H "Host: szdevs.com" --max-time 10 https://76.13.165.130/health 2>&1 || echo "curl failed"

      - name: Diagnose VPS
        if: inputs.mode == 'diagnose'
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.165.130
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e
            docker ps -a
            docker logs --tail 30 SZDevs-nginx 2>&1 || echo "no nginx logs"
            ss -tlnp | grep -E ':80 |:443 ' || echo "nothing on 80/443"
            ls -la /opt/szdevs/infra/certs/
            grep "resolver" /opt/szdevs/infra/nginx.conf || echo "no resolver in nginx.conf"
            exit 0
